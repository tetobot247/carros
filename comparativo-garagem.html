<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comparativo da Garagem — Análise de Desvalorização de Veículos Elétricos</title>
<link rel="stylesheet" href="styles.css">

<style>
/* Page-specific styles */
.garage-empty {
  text-align: center;
  padding: 40px;
  background: var(--card-bg);
  border: 1px dashed rgba(255,255,255,0.2);
  border-radius: 16px;
  color: var(--text-muted);
}

.ranked-bar-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 20px;
  width: 100%;
  max-width: 1000px;
}

.ranked-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 12px 16px;
  position: relative;
  overflow: hidden;
}

.ranked-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 800;
  z-index: 2;
}

.ranked-item-details {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text-muted);
  z-index: 2;
  flex-wrap: wrap;
}

.bar-track {
  width: 100%;
  height: 12px;
  background: rgba(0,0,0,0.5);
  border-radius: 6px;
  margin-top: 6px;
  overflow: hidden;
  z-index: 2;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s ease-out;
}

.cost-value {
  font-size: 18px;
  font-weight: 900;
}

.rank-badge {
  background: rgba(255,255,255,0.1);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
}

.rank-1 { background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); color: #000; }
.rank-2 { background: linear-gradient(135deg, #e5e5ea 0%, #aeaeb2 100%); color: #000; }
.rank-3 { background: linear-gradient(135deg, #d2a679 0%, #a67c52 100%); color: #000; }

.btn-link {
  color: #32ade6;
  text-decoration: none;
  font-size: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>&#128200; Comparativo da Garagem</h1>
    <div class="sub">Ranking de Custo Mensal das Ofertas Guardadas</div>
  </div>
  <div class="nav-links-row">
    <a href="index.html" class="nav-link">&larr; Voltar à Garagem</a>
    <a href="mega-matriz-todas-ofertas.html" class="nav-link">Destacar na Mega Matriz &rarr;</a>
  </div>
</div>

<div style="max-width:1000px;width:100%;margin-top:20px" id="mainContent">
  <!-- Content injected by JS -->
</div>

<footer>
  <a href="index.html" class="nav-link" style="margin-right:10px">&larr; Portal</a>
  Consenso: tetoBot + Subagentes &middot; Jul/2026 &middot; Motor Partilhado engine.js
</footer>

<script src="engine.js"></script>
<script>
(function(){
  'use strict';
  var E = CarEngine;
  
  function getGarageOffers() {
    var saved = localStorage.getItem('garageOffers');
    if (saved) return JSON.parse(saved);
    return [];
  }

  function renderComparative() {
    var offers = getGarageOffers();
    var container = document.getElementById('mainContent');
    
    if (offers.length === 0) {
      container.innerHTML = '<div class="garage-empty"><h2>A tua Garagem está vazia!</h2><p>Vai ao <a href="index.html" style="color:#30d158">Portal</a> para adicionares ofertas reais (modelo, ano, km e preço).</p></div>';
      return;
    }

    // Calcular custo mensal para cada oferta
    var validOffers = [];
    var invalidOffers = [];
    
    offers.forEach(function(o) {
      var car = E.getCar(o.carId);
      var r = E.aResale(car, o.km);
      var m = E.moVal(o.price, r);
      var wObj = E.getEffectiveWarranty(car, o.km);
      
      var data = {
        orig: o,
        car: car,
        resale: r,
        cost: m,
        wObj: wObj
      };
      
      if (m !== null) validOffers.push(data);
      else invalidOffers.push(data);
    });

    // Ordenar da mais barata para a mais cara
    validOffers.sort(function(a, b) { return a.cost - b.cost; });
    
    var html = '<div style="font-size:14px;font-weight:800;margin-bottom:8px">&#127942; Ranking de Oportunidades (Do menor custo para o maior)</div>';
    html += '<div class="ranked-bar-container">';
    
    var maxCost = 0;
    if (validOffers.length > 0) {
      maxCost = Math.max.apply(null, validOffers.map(function(d){ return d.cost; }));
      // Dar uma folga na escala
      maxCost = Math.max(maxCost * 1.1, 400); 
    }

    validOffers.forEach(function(d, idx) {
      var rank = idx + 1;
      var rankCls = '';
      if (rank === 1) rankCls = 'rank-1';
      else if (rank === 2) rankCls = 'rank-2';
      else if (rank === 3) rankCls = 'rank-3';
      
      var brandColor = '';
      if(d.car.brand === 'tesla') brandColor = '#ff3b30';
      if(d.car.brand === 'tesla_lr') brandColor = '#ff9f0a';
      if(d.car.brand === 'ioniq5') brandColor = '#32ade6';
      if(d.car.brand === 'ioniq5_58') brandColor = '#5ac8fa';
      if(d.car.brand === 'megane') brandColor = '#af52de';
      
      var barPct = (d.cost / maxCost) * 100;
      
      html += '<div class="ranked-item" style="border-left: 4px solid ' + brandColor + '">';
      
      html += '<div class="ranked-item-header">';
      html += '<div style="display:flex;align-items:center;gap:10px">';
      html += '<span class="rank-badge ' + rankCls + '">#' + rank + '</span>';
      html += '<span>' + d.car.n + ' (' + d.car.y + ')</span>';
      html += '</div>';
      html += '<div class="cost-value" style="color:' + E.col(d.cost) + '">€' + d.cost + '<span style="font-size:10px;font-weight:400;color:var(--text-muted)">/mês</span></div>';
      html += '</div>';
      
      html += '<div class="ranked-item-details">';
      html += '<span>Compra: <b>€' + d.orig.price.toLocaleString('pt-PT') + '</b></span>';
      html += '<span>Km: <b>' + d.orig.km + 'k km</b></span>';
      html += '<span>Revenda (2028): <b>€' + d.resale.toLocaleString('pt-PT') + '</b></span>';
      html += '<span>Garantia: <b>' + d.wObj.effMonths + 'm</b> (Limite: ' + d.wObj.limitingFactor + ')</span>';
      if (d.orig.url) {
        html += '<a href="' + d.orig.url + '" target="_blank" class="btn-link">&#128279; Abrir Anúncio</a>';
      }
      html += '</div>';
      
      html += '<div class="bar-track">';
      html += '<div class="bar-fill" style="width:' + barPct + '%;background:' + E.col(d.cost) + '"></div>';
      html += '</div>';
      
      html += '</div>';
    });
    
    html += '</div>';
    
    if (invalidOffers.length > 0) {
      html += '<div style="margin-top:40px;font-size:14px;font-weight:800;color:#ff453a">⚠️ Ofertas Inválidas (Preço Irrealista)</div>';
      html += '<div class="ranked-bar-container" style="opacity:0.6">';
      invalidOffers.forEach(function(d) {
        html += '<div class="ranked-item">';
        html += '<div class="ranked-item-header">';
        html += '<span>' + d.car.n + ' (' + d.car.y + ')</span>';
        html += '<span style="color:#ff453a">Erro</span>';
        html += '</div>';
        html += '<div class="ranked-item-details">';
        html += '<span>Compra: €' + d.orig.price.toLocaleString('pt-PT') + '</span>';
        html += '<span>Revenda Estimada: €' + d.resale.toLocaleString('pt-PT') + ' (A compra não pode ser inferior ou igual à revenda)</span>';
        if (d.orig.url) html += '<a href="' + d.orig.url + '" target="_blank" class="btn-link">&#128279; Abrir Anúncio</a>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  renderComparative();

})();
</script>

</body>
</html>
