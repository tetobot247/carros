<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matrizes Depreciação v3 (2021-2024)</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Page-specific: granular card layout */
:root { --bg: #000; }
body { background: #000; padding: 12px; gap: 14px; }
h1 { font-size: 18px; font-weight: 700; opacity: .9; margin-top: 6px;
  background: none; -webkit-text-fill-color: #fff; }
.sub { font-size: 10px; color: rgba(255,255,255,.35); text-align: center; }

.filter-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 900px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px; padding: 10px 14px; }
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-label { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 600;
  min-width: 90px; text-transform: uppercase; letter-spacing: .5px; }
.filter-btn { font-size: 10px; padding: 4px 10px; }
.filter-btn.active { box-shadow: 0 0 10px rgba(48,209,88,.3); }

.card { background: rgba(255,255,255,.06); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 16px;
  padding: 12px 8px; width: 100%; max-width: 100%; overflow-x: auto; }
h2 { font-size: 13px; font-weight: 600; display: flex; align-items: center;
  gap: 6px; margin-bottom: 2px; white-space: nowrap; }
.best { font-size: 10px; color: #30d158; margin: 2px 0 1px; }
.bdet { font-size: 9px; color: rgba(255,255,255,.4); margin: 0 0 6px; }
table { font-size: 9px; min-width: 640px; }
th { color: rgba(255,255,255,.45); padding: 3px 2px; font-size: 8px; font-weight: 500; }
th:first-child { text-align: left; color: rgba(255,255,255,.3); min-width: 42px;
  font-size: 7px; position: sticky; left: 0; background: #000; z-index: 1; }
td { padding: 3px 2px; font-size: 9px; font-weight: 500; }
td:first-child { color: rgba(255,255,255,.4); font-weight: 500; text-align: left;
  font-size: 8px; white-space: nowrap; position: sticky; left: 0; background: #000; z-index: 1; }
.rrow td { border-top: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.35);
  font-size: 8px; font-weight: 400; font-style: italic; }
.rrow td:first-child { color: rgba(255,255,255,.25); font-size: 7px; font-style: italic; }
.wbox { border: 1px solid; border-radius: 8px; padding: 6px 10px;
  margin: 4px 0 6px; font-size: 9px; color: rgba(255,255,255,.65); line-height: 1.6; }
.wbox b { font-weight: 600; }
.summ { font-size: 9px; color: rgba(255,255,255,.4); margin: 2px 0 6px;
  font-style: italic; line-height: 1.4; }
.nota { font-size: 9px; color: rgba(255,255,255,.3); margin-top: 4px; }
.legend { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  font-size: 8px; color: rgba(255,255,255,.35); margin: 2px 0; }
.d { width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  vertical-align: middle; margin-right: 1px; }
footer { font-size: 8px; color: rgba(255,255,255,.15); padding: 8px 0 4px; }
.rank { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin: 6px 0 0; padding: 6px 0 0; border-top: 1px solid rgba(255,255,255,.06); }
.ri { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px; padding: 6px 8px; font-size: 8px; text-align: center; min-width: 75px; }
.rn { font-size: 14px; font-weight: 700; display: block; }
.rv { display: block; margin-top: 1px; font-size: 7px; }
.vb { display: inline-block; font-size: 8px; color: #ffd60a;
  background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.15);
  border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
</style>
</head>
<body>

<h1>&#9889; Depreciação Mensal <span class="vb">v3 (2021 - 2024)</span></h1>
<div class="sub">28 meses &middot; 750 km/mês &middot; Ago/2026 &rarr; Dez/2028 &middot; Porto &middot; 18 Modelos/Anos</div>

<div class="filter-container">
    <div class="filter-row">
        <span class="filter-label">Ano Fabrico:</span>
        <button class="filter-btn active" onclick="setYear('all', this)">Todos (2021-2024)</button>
        <button class="filter-btn" onclick="setYear(2021, this)">2021</button>
        <button class="filter-btn" onclick="setYear(2022, this)">2022</button>
        <button class="filter-btn" onclick="setYear(2023, this)">2023</button>
        <button class="filter-btn" onclick="setYear(2024, this)">2024</button>
    </div>
    <div class="filter-row">
        <span class="filter-label">Modelo:</span>
        <button class="filter-btn active" onclick="setModel('all', this)">Todos</button>
        <button class="filter-btn" onclick="setModel('tesla', this)">Tesla M3 LFP</button>
        <button class="filter-btn" onclick="setModel('tesla_lr', this)">Tesla M3 LR</button>
        <button class="filter-btn" onclick="setModel('ioniq5_58', this)">IONIQ 5 58k</button>
        <button class="filter-btn" onclick="setModel('ioniq5', this)">IONIQ 5 LR</button>
        <button class="filter-btn" onclick="setModel('megane', this)">Megane E-Tech</button>
    </div>
</div>

<div class="legend" id="legend"></div>
<div id="app"></div>

<footer>
  <a href="index.html" class="nav-link" style="margin-right:10px">&larr; Portal</a>
  Consenso: tetoBot + Subagentes &middot; Jul/2026 &middot; v4.0 (18 Variantes)
</footer>

<script src="engine.js"></script>
<script>
(function(){
'use strict';
var E = CarEngine;
var M = E.M, KPM = E.KPM, TKM = E.TKM, LFPR = E.LFPR;
var KM = E.KM, PR = E.PR, MN = E.MN, CARS = E.CARS;
var wMonths = E.wMonths, wPenalty = E.wPenalty;
var aResale = E.aResale, moVal = E.moVal, col = E.col;
var fmt = E.fmt, wExpiry = E.wExpiry, wLabel = E.wLabel;

var currentYear = 'all';
var currentModel = 'all';

window.setYear = function(year, btn) {
    currentYear = year;
    updateButtons(btn);
    renderApp();
};

window.setModel = function(model, btn) {
    currentModel = model;
    updateButtons(btn);
    renderApp();
};

function updateButtons(clickedBtn) {
    var parent = clickedBtn.parentElement;
    var btns = parent.querySelectorAll('.filter-btn');
    btns.forEach(function(b){ b.classList.remove('active'); });
    clickedBtn.classList.add('active');
}

function filterCars() {
    return CARS.filter(function(c) {
        var matchYear = (currentYear === 'all' || c.y == currentYear);
        var matchModel = (currentModel === 'all' || c.brand === currentModel);
        return matchYear && matchModel;
    });
}

function renderLegend() {
    var el = document.getElementById('legend');
    var steps = [100, 200, 300, 400, 500, 600, 700];
    var h = '';
    for (var i = 0; i < steps.length; i++) {
        h += '<span><span class="d" style="background:' + col(steps[i]) + '"></span>\u20AC' + steps[i] + '</span>';
    }
    el.innerHTML = h;
}

function renderCard(c) {
    var pen = wPenalty(c);
    var wm = wMonths(c);
    var we = wExpiry(c);
    var wl = wLabel(c);
    var mpen = Math.round(pen / M);

    var bM = Infinity, bK = 0, bP = 0;
    for (var pi = 0; pi < PR.length; pi++) {
        var p = PR[pi];
        for (var ki = 0; ki < KM.length; ki++) {
            var r = aResale(c, KM[ki]);
            var m = moVal(p, r);
            if (m !== null && m < bM) { bM = m; bK = KM[ki]; bP = p; }
        }
    }

    var bR = (bP > 0) ? aResale(c, bK) : 0;
    var bD = bP - bR;
    var bPct = (bP > 0) ? (bD / bP * 100).toFixed(1) : 0;
    var bF = bK + TKM / 1000;

    var wc = pen >= 2000 ? '#ff453a' : pen >= 750 ? '#ffd60a' : '#30d158';
    var wb = pen >= 2000 ? 'rgba(255,69,58,.08)' : pen >= 750 ? 'rgba(255,200,50,.06)' : 'rgba(48,209,88,.06)';
    var wbb = pen >= 2000 ? 'rgba(255,69,58,.18)' : pen >= 750 ? 'rgba(255,200,50,.12)' : 'rgba(48,209,88,.15)';

    var h = '<div class="card">';
    h += '<h2>' + c.n + ' <span class="tag">' + c.y + '</span></h2>';
    if (bM !== Infinity) {
        h += '<div class="best">\uD83C\uDFF7\uFE0F M\u00EDnimo Deprecia\u00E7\u00E3o Realista (@' + fmt(bP) + '/' + bK + 'k km): <b>\u20AC' + bM + '/m\u00EAs</b> (' + bF + 'k final)</div>';
        h += '<div class="bdet">Revenda Estimada: ' + fmt(bR) + ' \u00B7 Depr Total: ' + fmt(bD) + ' (' + bPct + '%) em ' + M + 'm</div>';
    } else {
        h += '<div class="best" style="color:var(--text-muted)">Preço de compra necessário acima de €35.000</div>';
    }

    h += '<div class="wbox" style="background:' + wb + ';border-color:' + wbb + '">';
    h += '\uD83D\uDD0B Expira: <b style="color:' + wc + '">' + we + '</b>';
    h += ' \u00B7 Restam na Venda: <b style="color:' + wc + '">' + wm + 'm</b>';
    h += ' \u00B7 Faixa: ' + wl;
    h += ' \u00B7 Pen. Aplicada: <b style="color:' + wc + '">-' + fmt(pen) + '</b>';
    if (c.lfp && pen > 0) h += ' <span class="lfp">(LFP \u00D7' + LFPR + ')</span>';
    h += ' \u2192 <b>+\u20AC' + mpen + '/m\u00EAs</b></div>';

    h += '<div class="summ">' + (c.s || '') + '</div>';

    h += '<table><tr><th>\u20AC\u2216km</th>';
    for (var i = 0; i < KM.length; i++) h += '<th>' + KM[i] + 'k</th>';
    h += '</tr>';

    for (var pi = 0; pi < PR.length; pi++) {
        var p = PR[pi];
        h += '<tr><td>' + fmt(p) + '</td>';
        for (var ki = 0; ki < KM.length; ki++) {
            var r = aResale(c, KM[ki]);
            var m = moVal(p, r);
            if (m !== null) {
                h += '<td style="color:' + col(m) + '">' + m + '</td>';
            } else {
                h += '<td style="color:rgba(255,255,255,.2);font-style:italic">&mdash;</td>';
            }
        }
        h += '</tr>';
    }

    h += '<tr class="rrow"><td>Revenda \u20ACk</td>';
    for (var ki = 0; ki < KM.length; ki++) {
        var r = aResale(c, KM[ki]);
        h += '<td>' + (r / 1000).toFixed(1) + '</td>';
    }
    h += '</tr>';

    h += '<tr class="rrow"><td>Depr % @25k</td>';
    for (var ki = 0; ki < KM.length; ki++) {
        var r = aResale(c, KM[ki]);
        if (25000 > r) {
            var pct = ((25000 - r) / 25000 * 100).toFixed(0);
            h += '<td>' + pct + '%</td>';
        } else {
            h += '<td>&mdash;</td>';
        }
    }
    h += '</tr>';

    h += '</table></div>';
    return h;
}

function renderRanking(list) {
    var REALISTIC_BUY_PRICE = E.REALISTIC_PRICES;
    var results = [];
    for (var ci = 0; ci < list.length; ci++) {
        var c = list[ci];
        var buyPrice = (c.brand === 'tesla_lr' ? (c.y === 2024 ? 37000 : REALISTIC_BUY_PRICE[c.y] + 3000) : REALISTIC_BUY_PRICE[c.y]);
        var bM = Infinity, bK = 0;
        for (var ki = 0; ki < KM.length; ki++) {
            var r = aResale(c, KM[ki]);
            var m = moVal(buyPrice, r);
            if (m !== null && m < bM) { bM = m; bK = KM[ki]; }
        }
        results.push({c: c, bM: bM, bK: bK, p: buyPrice});
    }
    results.sort(function(a, b) { return a.bM - b.bM; });

    var rc = ['#ffd60a', '#e0e0e0', '#cd7f32', 'rgba(255,255,255,.5)'];

    var h = '<div class="card"><h2>\uD83C\uDFF7\uFE0F Ranking Sweet Spots <span class="tag">Preços Realistas por Ano</span></h2><div class="rank">';
    for (var i = 0; i < Math.min(results.length, 6); i++) {
        var r = results[i];
        var color = i < 3 ? rc[i] : rc[3];
        h += '<div class="ri">';
        h += '<span class="rn" style="color:' + color + '">' + (i + 1) + '</span>';
        h += '<span style="color:#fff;font-weight:600;font-size:10px">\u20AC' + r.bM + '/m\u00EAs</span>';
        h += '<span class="rv" style="color:rgba(255,255,255,.4)">\u20AC' + (r.p / 1000).toFixed(0) + 'k/' + r.bK + 'k km</span>';
        h += '<span class="rv" style="color:rgba(255,255,255,.3)">' + r.c.n + ' (' + r.c.y + ')</span>';
        h += '</div>';
    }
    h += '</div></div>';
    return h;
}

function renderApp() {
    var filtered = filterCars();
    var html = '';
    if (filtered.length === 0) {
        html = '<div style="color:rgba(255,255,255,.5);padding:20px;text-align:center">Nenhum veículo encontrado para os filtros selecionados.</div>';
    } else {
        html += renderRanking(filtered);
        for (var i = 0; i < filtered.length; i++) {
            html += renderCard(filtered[i]);
        }
    }
    document.getElementById('app').innerHTML = html;
}

renderLegend();
renderApp();

})();
</script>
</body>
</html>
