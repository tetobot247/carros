<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matriz Granular Unificada — Todos os Elétricos</title>
<link rel="stylesheet" href="styles.css">

<style>
/* Page-specific styles */
header { max-width: 1000px; }
.controls-card { max-width: 1200px; }

/* Split View Grid */
.split-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 14px;
  width: 100%;
  max-width: 1200px;
}

.split-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-x: auto;
}

/* Table Card */
.table-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  backdrop-filter: blur(24px);
  border-radius: 16px;
  padding: 16px;
  width: 100%;
  max-width: 1200px;
  overflow-x: auto;
}

.table-header-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 10px;
}

.table-title {
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-inline {
  display: flex;
  gap: 12px;
  font-size: 10px;
}

table { min-width: 800px; }

td:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  background: var(--bg);
  z-index: 2;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <h1>&#9889; Matriz Granular Unificada Multi-Modelo</h1>
  <div class="sub">Todos os Dados Granulares (Preço x Km x Garantia) Reunidos Numa Só Visualização Comparativa</div>
</header>

<!-- Painel de Controlo -->
<div class="controls-card">
  <div class="control-row">
    <span class="control-label">Modo de Visualização:</span>
    <button class="btn-pill active" onclick="setViewMode('unified_table', this)">Tabela Cruzada Unificada</button>
    <button class="btn-pill" onclick="setViewMode('side_by_side', this)">Matrizes Granulares Lado a Lado</button>
  </div>

  <div class="control-row" id="priceControlRow">
    <span class="control-label">Preço de Compra:</span>
    <button class="btn-pill active" onclick="setPriceFilter('realistic', this)">Realista por Ano (Recomendado)</button>
    <button class="btn-pill" onclick="setPriceFilter(23000, this)">€23.000</button>
    <button class="btn-pill" onclick="setPriceFilter(25000, this)">€25.000</button>
    <button class="btn-pill" onclick="setPriceFilter(28000, this)">€28.000</button>
    <button class="btn-pill" onclick="setPriceFilter(32000, this)">€32.000</button>
  </div>

  <div class="control-row">
    <span class="control-label">Filtrar por Ano:</span>
    <button class="btn-pill active" onclick="setYearFilter('all', this)">Todos os Anos (2020-2025)</button>
    <button class="btn-pill" onclick="setYearFilter(2020, this)">2020</button>
    <button class="btn-pill" onclick="setYearFilter(2021, this)">2021</button>
    <button class="btn-pill" onclick="setYearFilter(2022, this)">2022</button>
    <button class="btn-pill" onclick="setYearFilter(2023, this)">2023</button>
    <button class="btn-pill" onclick="setYearFilter(2024, this)">2024</button>
    <button class="btn-pill" onclick="setYearFilter(2025, this)">2025</button>
  </div>
</div>

<div id="mainApp" style="width:100%;max-width:1200px"></div>

<footer>
  <a href="index.html" class="nav-link" style="margin-right:10px">&larr; Portal</a>
  Consenso: tetoBot + Subagentes &middot; Jul/2026 &middot; Visualização Granular Unificada
</footer>

<script src="engine.js"></script>
<script>
(function(){
'use strict';
var E = CarEngine;
var M = E.M, TKM = E.TKM, LFPR = E.LFPR;
var KM = E.KM, PR = E.PR, CARS = E.CARS;
var REALISTIC_PRICES = E.REALISTIC_PRICES;
var wMonths = E.wMonths, wPenalty = E.wPenalty;
var aResale = E.aResale, moVal = E.moVal, col = E.col;

var viewMode = 'unified_table';
var priceFilter = 'realistic';
var yearFilter = 'all';

function getBadgeHtml(c) {
    var cls = 'ind-' + c.brand;
    var dotCls = 'dot-' + c.brand;
    return '<span class="model-indicator ' + cls + '"><span class="dot ' + dotCls + '"></span>' + c.n + ' <span style="opacity:0.8">(' + c.y + ')</span></span>';
}

window.setViewMode = function(mode, btn) {
    viewMode = mode;
    updateButtons(btn);
    renderApp();
};

window.setPriceFilter = function(price, btn) {
    priceFilter = price;
    updateButtons(btn);
    renderApp();
};

window.setYearFilter = function(year, btn) {
    yearFilter = year;
    updateButtons(btn);
    renderApp();
};

function updateButtons(clickedBtn) {
    var parent = clickedBtn.parentElement;
    var btns = parent.querySelectorAll('.btn-pill');
    btns.forEach(function(b){ b.classList.remove('active'); });
    clickedBtn.classList.add('active');
}

function filterCarsList() {
    return CARS.filter(function(c) {
        return yearFilter === 'all' || c.y == yearFilter;
    });
}

function renderUnifiedTable() {
    var list = filterCarsList();
    var h = '<div class="table-card">';
    h += '<div class="table-header-box">';
    h += '<div class="table-title">&#128202; Matriz Cruzada Unificada (€/mês por Km de Compra)</div>';
    h += '<div class="legend-inline">';
    h += '<span style="color:#ff453a">&#9679; Tesla</span>';
    h += '<span style="color:#64d2ff">&#9679; IONIQ 5</span>';
    h += '<span style="color:#30d158">&#9679; Kia EV6</span>';
    h += '<span style="color:#007aff">&#9679; BMW i3</span>';
    h += '<span style="color:#ffd60a">&#9679; Polestar</span>';
    h += '<span style="color:#ff9500">&#9679; Cupra</span>';
    h += '<span style="color:#d070ff">&#9679; Megane</span>';
    h += '</div></div>';

    h += '<table><thead><tr>';
    h += '<th>Modelo &amp; Ano</th>';
    h += '<th>Preço Compra</th>';
    h += '<th>Penalização</th>';
    for (var ki = 0; ki < KM.length; ki++) {
        h += '<th>' + KM[ki] + 'k</th>';
    }
    h += '</tr></thead><tbody>';

    list.forEach(function(c) {
        var price = (priceFilter === 'realistic') ? REALISTIC_PRICES[c.y] : Number(priceFilter);
        var pen = wPenalty(c);

        h += '<tr>';
        h += '<td>' + getBadgeHtml(c) + '</td>';
        h += '<td style="color:#ffd60a;font-weight:700">\u20AC' + price.toLocaleString('pt-PT') + '</td>';
        h += '<td style="color:var(--text-muted);font-size:8px">-' + pen + '\u20AC</td>';

        for (var ki = 0; ki < KM.length; ki++) {
            var r = aResale(c, KM[ki]);
            var m = moVal(price, r);
            if (m !== null) {
                h += '<td><span class="cell-pill" style="background:' + col(m) + ';color:#000">' + m + '</span></td>';
            } else {
                h += '<td><span class="cell-na">&mdash;</span></td>';
            }
        }
        h += '</tr>';
    });

    h += '</tbody></table></div>';
    return h;
}

function renderSideBySide() {
    var list = filterCarsList();
    var h = '<div class="split-grid">';

    list.forEach(function(c) {
        var price = (priceFilter === 'realistic') ? REALISTIC_PRICES[c.y] : Number(priceFilter);
        var pen = wPenalty(c);
        var borderCls = 'border-' + c.brand;

        h += '<div class="split-card ' + borderCls + '">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center">';
        h += getBadgeHtml(c);
        h += '<span style="font-size:10px;color:#ffd60a;font-weight:700">Compra: \u20AC' + price.toLocaleString('pt-PT') + '</span>';
        h += '</div>';

        h += '<table><thead><tr><th>Km</th><th>Revenda</th><th>Pen.</th><th>\u20AC/mês</th></tr></thead><tbody>';

        for (var ki = 0; ki < KM.length; ki++) {
            var k = KM[ki];
            var r = aResale(c, k);
            var m = moVal(price, r);

            h += '<tr>';
            h += '<td>' + k + 'k km</td>';
            h += '<td style="color:var(--text-muted)">\u20AC' + r.toLocaleString('pt-PT') + '</td>';
            h += '<td style="color:rgba(255,255,255,0.3)">-' + pen + '\u20AC</td>';
            if (m !== null) {
                h += '<td><span class="cell-pill" style="background:' + col(m) + ';color:#000">' + m + '\u20AC</span></td>';
            } else {
                h += '<td><span class="cell-na">&mdash;</span></td>';
            }
            h += '</tr>';
        }

        h += '</tbody></table></div>';
    });

    h += '</div>';
    return h;
}

function renderApp() {
    var el = document.getElementById('mainApp');
    if (viewMode === 'unified_table') {
        el.innerHTML = renderUnifiedTable();
    } else {
        el.innerHTML = renderSideBySide();
    }
}

renderApp();

})();
</script>
</body>
</html>
